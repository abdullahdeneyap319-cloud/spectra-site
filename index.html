<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Havelance v5</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
    text-align: center;
    touch-action: none;
}

/* FULLSCREEN */
canvas, body {
    width: 100vw;
    height: 100vh;
}

/* UI */
#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #00eaff;
    box-shadow: 0 0 15px #00eaff;
    border-radius: 10px;
}

/* LEADERBOARD */
#board {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 160px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #8a2be2;
    box-shadow: 0 0 15px #8a2be2;
    padding: 10px;
    font-size: 12px;
}

/* CONTROLS */
#fire {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(#ff0055,#8a2be2);
    box-shadow: 0 0 20px #ff0055;
}

/* FULLSCREEN BUTTON */
#fs {
    position: fixed;
    bottom: 30px;
    left: 30px;
    padding: 10px;
    background: #00eaff;
    color: black;
}
</style>
</head>

<body>

<div id="ui">Score: 0 | Level: 1</div>
<div id="board">🏆 Loading...</div>

<button id="fs">FULLSCREEN</button>
<div id="fire"></div>

<canvas id="game"></canvas>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1d6b0b0a0.mp3">
</audio>

<script>
// =====================
// 🌐 FIREBASE (REALTIME DB)
// =====================
const DB_URL = "YOUR_FIREBASE_URL/scores.json"; // <- değiştir

// =====================
// 🎵 MUSIC + BEAT SYNC
// =====================
const music = document.getElementById("music");
let beatBoost = 1;

// beat simulation (audio analiz yok -> basit pulse)
setInterval(()=>{
    beatBoost = 1.5;
    setTimeout(()=>beatBoost=1,100);
}, 500);

// =====================
// 📱 FULLSCREEN
// =====================
document.getElementById("fs").onclick = ()=>{
    document.documentElement.requestFullscreen();
    music.play();
};

// =====================
// 🎮 GAME
// =====================
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let player = {x:innerWidth/2,y:innerHeight-100,size:25};
let bullets = [];
let enemies = [];
let score = 0;
let level = 1;

// =====================
// 🔫 FIRE
// =====================
document.getElementById("fire").ontouchstart = ()=>{
    bullets.push({
        x:player.x,
        y:player.y,
        size:6,
        speed:8
    });
};

// =====================
// 👾 ENEMY SPAWN (BEAT SYNCED)
// =====================
function spawnEnemy(){
    enemies.push({
        x:Math.random()*c.width,
        y:0,
        size:25,
        speed:(2+level*0.3)*beatBoost
    });
}

// =====================
// 💥 COLLISION
// =====================
function hit(a,b){
    return a.x<b.x+b.size &&
           a.x+a.size>b.x &&
           a.y<b.y+b.size &&
           a.y+a.size>b.y;
}

// =====================
// 🌐 ONLINE LEADERBOARD
// =====================
async function saveScore(){
    await fetch(DB_URL,{
        method:"POST",
        body:JSON.stringify({score:score})
    });
}

async function loadBoard(){
    let res = await fetch(DB_URL);
    let data = await res.json();

    let arr = Object.values(data||{});
    arr.sort((a,b)=>b.score-a.score);

    document.getElementById("board").innerHTML =
    "🏆 LEADERBOARD<br>" +
    arr.slice(0,5).map(s=>"⭐ "+s.score).join("<br>");
}

setInterval(loadBoard,3000);

// =====================
// 🎮 LOOP
// =====================
function loop(){
    ctx.clearRect(0,0,c.width,c.height);

    // player
    ctx.fillStyle="#00eaff";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    // bullets
    ctx.fillStyle="yellow";
    bullets.forEach((b,i)=>{
        b.y-=b.speed;
        ctx.fillRect(b.x,b.y,b.size,b.size);
        if(b.y<0) bullets.splice(i,1);
    });

    // enemies
    ctx.fillStyle="red";

    enemies.forEach((e,ei)=>{
        e.y+=e.speed;
        ctx.fillRect(e.x,e.y,e.size,e.size);

        // hit player
        if(hit(player,e)){
            saveScore();
            alert("💀 Game Over: "+score);
            location.reload();
        }

        // bullet hit
        bullets.forEach((b,bi)=>{
            if(hit(b,e)){
                enemies.splice(ei,1);
                bullets.splice(bi,1);

                score++;
                if(score%10==0) level++;

                document.getElementById("ui").innerText =
                "Score: "+score+" | Level: "+level;
            }
        });

        if(e.y>c.height) enemies.splice(ei,1);
    });

    if(Math.random()<0.03*beatBoost) spawnEnemy();

    requestAnimationFrame(loop);
}
loop();

// start music on interaction
document.body.addEventListener("touchstart",()=>{
    music.play();
},{once:true});

</script>

</body>
</html>
