<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Havelance</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

h1 {
    margin-top: 120px;
    font-size: 60px;
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff, 0 0 40px #8a2be2;
}

p {
    color: #aaa;
}

.btn {
    margin-top: 30px;
    padding: 15px 30px;
    background: linear-gradient(45deg, #00eaff, #8a2be2);
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 20px #8a2be2;
}

.btn:hover {
    transform: scale(1.1);
}

img {
    width: 200px;
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px #00eaff;
}
</style>

</head>
<body>

<canvas id="stars"></canvas>

<h1>HAVELANCE</h1>
<p>Neon Warrior of the Night</p>

<img src="https://i.imgur.com/8Km9tLL.png">

<br>
<button class="btn" onclick="playMusic()">Müziği Başlat</button>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function playMusic() {
    document.getElementById("music").play();
}

// yıldız efekti
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += 0.5;
        if (s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
  </html>
